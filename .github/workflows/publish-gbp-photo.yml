name: Publication automatique photo Google Business

# Ajoute 1 photo sur la fiche à chaque exécution.
# Lundi + vendredi = 2 photos/semaine (jours décalés des posts mardi/jeudi).
on:
  schedule:
    - cron: "20 8 * * 1" # lundi 08:20 UTC
    - cron: "20 8 * * 5" # vendredi 08:20 UTC
  workflow_dispatch: {}

concurrency:
  group: publish-gbp-photo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Générer et publier la photo GBP
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
        run: node scripts/publish-gbp-photo.mjs
